<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background-color:#f8f9fa; font-family:Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:12px; overflow:hidden; border:1px solid #edf2f7;">
                    
                    <!-- HEADER -->
                    <tr>
                        <td style="background:#1a73e8; color:#ffffff; text-align:center; padding:40px 20px;">
                            <h1 style="margin:0; font-size:28px;">Venue System</h1>
                        </td>
                    </tr>

                    <!-- BODY -->
                    <tr>
                        <td style="padding:40px 30px; color:#4a5568;">
                            <h2 style="color:#1a202c;">{{subject}}</h2>

                            <p>Hello,</p>

                            <div style="margin:25px 0;">
                                {{content}}
                            </div>

                            <p>If you didn't request this, you can safely ignore this email.</p>

                            <p style="margin-top:30px;">
                                Best regards,<br>
                                <strong>The Venue System Team</strong>
                            </p>
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td style="background:#f8fafc; text-align:center; padding:20px; font-size:13px; color:#94a3b8;">
                            <p>This is an automated message, please do not reply.</p>
                            <p>&copy; {{date}} Venue System</p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
