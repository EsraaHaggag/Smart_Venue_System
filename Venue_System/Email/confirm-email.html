<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Your Email</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, sans-serif; background-color:#f4f6f8;">

    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">

                <table width="500" style="background:#ffffff; margin-top:40px; border-radius:10px; padding:30px; box-shadow:0 5px 20px rgba(0,0,0,0.1);">

                    <tr>
                        <td align="center">
                            <h2 style="color:#333;">🎉 Welcome to Venue System</h2>
                        </td>
                    </tr>

                    <tr>
                        <td style="color:#555; font-size:15px; line-height:1.6;">
                            <p>Hello 👋</p>

                            <p>
                                Thank you for registering! Please confirm your email address by clicking the button below.
                            </p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding:25px 0;">
                            <a href="{{link}}"
                               style="background:#4CAF50; color:white; padding:12px 25px; text-decoration:none; border-radius:6px; font-size:16px; font-weight:bold;">
                                Confirm Email
                            </a>
                        </td>
                    </tr>

                    <tr>
                        <td style="color:#999; font-size:13px;">
                            <p>
                                If you did not create an account, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-top:20px; color:#aaa; font-size:12px;">
                            © 2026 Venue System. All rights reserved.
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
